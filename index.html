<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Kısa Bir Mola</title>
    <!-- Tailwind CSS (Hızlı ve modern tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Arka plan için özel animasyonlar */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        .animate-blob {
            animation: blob 7s infinite alternate;
        }
        
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Cam karta hafif bir süzülme efekti */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Çark dönüş animasyonu */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        .animate-spin-slow-reverse {
            animation: spin-slow 10s linear infinite reverse;
        }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-100 overflow-hidden selection:bg-indigo-500 selection:text-white">

    <!-- Animasyonlu Arka Plan Şekilleri -->
    <div class="fixed inset-0 w-full h-full z-0 flex items-center justify-center pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Ana İçerik Konteyneri -->
    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-4">
        
        <!-- Glassmorphism Kartı -->
        <div class="relative w-full max-w-2xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 sm:p-14 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] animate-float flex flex-col items-center text-center">
            
            <!-- Logo / Marka -->
            <div class="mb-8">
                <h1 class="text-4xl sm:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                    MATOTA
                </h1>
                <div class="h-1 w-1/2 mx-auto bg-gradient-to-r from-cyan-400 to-purple-500 rounded-full mt-2 opacity-50"></div>
            </div>

            <!-- İkonlar (Animasyonlu Çarklar) -->
            <div class="relative w-24 h-24 mb-8 flex items-center justify-center">
                <!-- Büyük Çark -->
                <svg class="absolute w-16 h-16 text-indigo-400 animate-spin-slow opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <!-- Küçük Çark -->
                <svg class="absolute w-10 h-10 text-cyan-400 animate-spin-slow-reverse transform translate-x-6 -translate-y-6 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </div>

            <!-- Başlık ve Açıklama -->
            <h2 class="text-2xl sm:text-3xl font-bold mb-4 text-white">
                Şu Anda Bakımdayız
            </h2>
            <p class="text-slate-300 text-sm sm:text-base leading-relaxed mb-8 max-w-md">
                Sizlere daha muazzam ve kesintisiz bir deneyim sunmak için sistemlerimizi güncelliyoruz. Çok yakında daha güçlü bir şekilde geri döneceğiz. Sabrınız için teşekkür ederiz.
            </p>

            <!-- Durum Bildirgesi -->
            <div class="flex items-center space-x-2 bg-white/5 border border-white/10 px-4 py-2 rounded-full backdrop-blur-md mb-8">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </span>
                <span class="text-sm font-medium text-amber-200/90 tracking-wide uppercase">Sistem Güncelleniyor</span>
            </div>

            <!-- İletişim Butonu -->
            <a href="mailto:iletisim@matota.com" class="group relative px-6 py-3 font-semibold text-white rounded-xl overflow-hidden bg-white/10 border border-white/20 hover:bg-white/20 transition-all duration-300">
                <span class="relative z-10 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Bize Ulaşın
                </span>
                <div class="absolute inset-0 h-full w-0 bg-gradient-to-r from-cyan-500 to-purple-500 transition-all duration-300 ease-out group-hover:w-full z-0 opacity-50"></div>
            </a>
            
        </div>

        <!-- Alt Bilgi (Footer) -->
        <p class="mt-8 text-slate-500 text-sm z-10">
            &copy; <script>document.write(new Date().getFullYear())</script> MATOTA. Tüm hakları saklıdır.
        </p>
    </div>

</body>
</html>
